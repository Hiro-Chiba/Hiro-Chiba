name: Update Language Stats

on:
  schedule:
    - cron: "30 0 * * 1,4"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate SVG stats
        env:
          REPOSCOPE_TOKEN: ${{ secrets.REPOSCOPE_TOKEN }}
          EXCLUDED_LANGUAGES: ${{ secrets.EXCLUDED_LANGUAGES }}
        run: |
          deno task generate \
            --token "$REPOSCOPE_TOKEN" \
            ${EXCLUDED_LANGUAGES:+--excluded-languages "$EXCLUDED_LANGUAGES"}

      - name: Create pull request for updated SVGs
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPOSCOPE_TOKEN }}
          commit-message: "update: language stats svg"
          branch: "automation/update-language-stats"
          delete-branch: true
          title: "update: language stats svg"
          body: |
            Automated update of language stats SVG.
          add-paths: |
            output/*.svg

      - name: Enable auto-merge for pull request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.REPOSCOPE_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "${PR_NUMBER}" --auto --squash --delete-branch
